# ==============================================================================
# Alicia Desktop Environment - Main Defaults Configuration
# Proyecto Tomorrow - Enterprise Linux Desktop for Android
# ==============================================================================
# This is the primary configuration file for the Alicia desktop environment.
# It defines default values for all subsystems and can be overridden by
# user-level configuration at ~/.config/alicia/alicia.conf
# ==============================================================================

# ---- Version Information ----
ALICIA_VERSION="1.0.0"
ALICIA_CODENAME="aurora"
ALICIA_BUILD_DATE="2025-01-01"
ALICIA_COMPAT_MIN_TERMUX="0.118.0"
ALICIA_COMPAT_MIN_PROOT="1.13.0"

# ---- Paths ----
ALICIA_BASE_DIR="${HOME}/alicia"
ALICIA_CONFIG_DIR="${ALICIA_BASE_DIR}/config"
ALICIA_DATA_DIR="${ALICIA_BASE_DIR}/data"
ALICIA_CACHE_DIR="${ALICIA_BASE_DIR}/cache"
ALICIA_LOG_DIR="${ALICIA_BASE_DIR}/logs"
ALICIA_LOCK_DIR="${ALICIA_BASE_DIR}/locks"
ALICIA_STATE_DIR="${ALICIA_BASE_DIR}/state"
ALICIA_TEMP_DIR="${ALICIA_BASE_DIR}/tmp"
ALICIA_BACKUP_DIR="${ALICIA_BASE_DIR}/backups"
ALICIA_LIB_DIR="${ALICIA_BASE_DIR}/lib"
ALICIA_BIN_DIR="${ALICIA_BASE_DIR}/bin"

# Proot distribution paths
PROOT_DISTRO_DIR="${PREFIX}/var/lib/proot-distro/installed-rootfs"
PROOT_ROOTFS="${PROOT_DISTRO_DIR}/debian"

# XFCE4 config destination
XFCE4_CONFIG_DEST="${PROOT_ROOTFS}/root/.config/xfce4"

# ---- VNC Settings ----
VNC_GEOMETRY="1280x720"
VNC_DEPTH="24"
VNC_PIXEL_FORMAT="32-24-8-8-8"
VNC_SECURITY_TYPES="VncAuth"
VNC_DEFAULT_PASSWORD="alicia"
VNC_PASSWORD_FILE="${HOME}/.vnc/passwd"
VNC_ENCODINGS="Tight,ZRLE,Hextile,Raw"
VNC_COMPRESSION_LEVEL="6"
VNC_JPEG_QUALITY="5"
VNC_DESKTOP_NAME="Alicia Desktop"
VNC_SERVER="tigervnc"
VNC_DISPLAY=":1"
VNC_LOCALHOST_ONLY="true"
VNC_LOG_LEVEL="info"
VNC_FRAME_RATE="24"
VNC_IDLE_TIMEOUT="0"
VNC_SHUTDOWN_TIMEOUT="10"

# ---- Desktop Settings ----
DESKTOP_ENVIRONMENT="xfce4"
DESKTOP_THEME="Adwaita"
DESKTOP_ICON_THEME="Adwaita"
DESKTOP_FONT="Sans 10"
DESKTOP_DPI="96"
DESKTOP_CURSOR_THEME="Adwaita"
DESKTOP_CURSOR_SIZE="24"
DESKTOP_WINDOW_MANAGER="xfwm4"
DESKTOP_COMPOSITOR="picom"
DESKTOP_ENABLE_COMPOSITING="true"
DESKTOP_FILE_MANAGER="thunar"
DESKTOP_TERMINAL="xfce4-terminal"
DESKTOP_EDITOR="mousepad"
DESKTOP_BROWSER="firefox-esr"
DESKTOP_WALLPAPER="${ALICIA_BASE_DIR}/share/wallpapers/alicia-default.png"

# ---- User Settings ----
DEFAULT_USERNAME="alicia"
DEFAULT_SHELL="/bin/bash"
DEFAULT_LANG="en_US.UTF-8"
DEFAULT_TIMEZONE="UTC"
DEFAULT_KEYBOARD_LAYOUT="us"
DEFAULT_LOCALE="en_US.UTF-8"
DEFAULT_GID="1000"
DEFAULT_UID="1000"

# ---- Network Settings ----
NETWORK_DNS1="8.8.8.8"
NETWORK_DNS2="8.8.4.4"
NETWORK_DNS_OVER_HTTPS="true"
NETWORK_PROXY=""
NETWORK_PROXY_PORT=""
NETWORK_PROXY_USER=""
NETWORK_PROXY_PASS=""
NETWORK_CONNECTIVITY_CHECK_URL="https://connectivity-check.ubuntu.com/"
NETWORK_CONNECTIVITY_CHECK_TIMEOUT="5"
NETWORK_FIREWALL_ENABLED="false"

# ---- Performance Settings ----
# Swappiness (0-100): lower = prefer keeping apps in RAM
PERF_SWAPPINESS="10"
# Cache pressure (0-200): lower = prefer keeping directory entries
PERF_CACHE_PRESSURE="50"
# VFS cache pressure
PERF_VFS_CACHE_PRESSURE="50"
# CPU governor: performance, powersave, ondemand, conservative, schedutil
PERF_CPU_GOVERNOR="ondemand"
# Compositor backend: xrender, glx
PERF_COMPOSITOR_BACKEND="xrender"
# Disable animations for better performance on low-end devices
PERF_DISABLE_ANIMATIONS="false"
# Maximum number of open file descriptors
PERF_MAX_FILE_DESCRIPTORS="65536"
# OOM score adjustment (-1000 to 1000): lower = less likely to be killed
PERF_OOM_SCORE_ADJ="-100"
# Background services nice level
PERF_BG_NICE_LEVEL="10"
# proot seccomp mode
PERF_PROOT_SECCOMP="true"

# ---- Proot Settings ----
PROOT_DISTRO="debian"
PROOT_SUITE="bookworm"
PROOT_ARCH="aarch64"
PROOT_ADDITIONAL_MOUNTS=""
PROOT_LINK2SYMLINK="true"
PROOT_SYSVIPC="true"

# ---- Package Management ----
PKG_PREFERRED_MIRROR=""
PKG_ADDITIONAL_REPOS=""
PKG_UPDATE_ON_BOOT="false"
PKG_AUTO_SECURITY_UPDATES="true"
PKG_MAX_PARALLEL_DOWNLOADS="4"

# ---- Logging Settings ----
LOG_LEVEL="info"
LOG_MAX_SIZE="10485760"
LOG_MAX_FILES="5"
LOG_TIMESTAMP_FORMAT="%Y-%m-%d %H:%M:%S"
LOG_TO_SYSLOG="false"

# ---- Backup Settings ----
BACKUP_ON_UPDATE="true"
BACKUP_MAX_COUNT="3"
BACKUP_COMPRESSION="gzip"
BACKUP_EXCLUDE_PATTERNS="*.tmp,*.log,cache/,tmp/"

# ---- Security Settings ----
SEC_LOCK_SCREEN_ON_SUSPEND="true"
SEC_AUTO_LOCK_TIMEOUT="300"
SEC_PASSWORD_MIN_LENGTH="6"
SEC_REQUIRE_PASSWORD="true"
SEC_ENCRYPT_HOME="false"

# ---- Integration Settings ----
TERMUX_API_ENABLED="true"
TERMUX_NOTIFICATIONS="true"
TERMUX_CLIPBOARD_SYNC="true"
ANDROID_STORAGE_ACCESS="true"
